#       (관용어→INCI 188 엔트리) 스냅샷 2026-07-22 를,
#       mockdata/product_catalog_es.json 의 MAIN_INGREDIENT 콤마분리 유니크
#       토큰 310종과 교집합하여, INCI가 카탈로그에 하나 이상 '정규화 완전일치'로
#       닿는 엔트리만 시드로 추출(85 엔트리 / 88 INCI). 각 엔트리의 INCI 리스트는
#       카탈로그에 닿는 토큰만 유지한다.
#
# 값(INCI)은 MAIN_INGREDIENT '표면 문자열 그대로'(정규화 전)이다. 런타임
# (src/rec/search.py resolve_query_concepts 별칭 레이어)에서 각 값을
# normalize_text 하여 concept id 'concept:Ingredient:<정규화>' 를 만들고,
# 현재 로드된 products 의 ingredient_concept_ids 에 실존하는 것만 채택한다
# (카탈로그 게이트). 관용어 키는 질의 부분문자열로 매칭하며 부정 스팬
# (없는/없이/빼고/제외(한)/프리/free) 안에 걸리면 양성 채택하지 않는다.
