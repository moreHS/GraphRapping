# Texture keyword normalization: surface form → canonical keyword
# Used by both user adapter (preference) and review normalizer (review signals)
# Upper axis: always "Texture" (BEE_ATTR)
# Lower keywords: specific texture expressions (KEYWORD)

texture_axis: "Texture"

surface_to_keyword:
  크리미: CreamyLike
  촉촉한: MoistLike
  젤: GelLike
  젤타입: GelLike
  가벼운로션: LightLotionLike
  가벼운 로션: LightLotionLike
  워터리: WateryLike
  리치크림: RichCreamLike
  리치 크림: RichCreamLike
  밀크: MilkLike
