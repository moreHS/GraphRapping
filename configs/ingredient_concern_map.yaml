# Ingredient → Concern bridge mapping (P7-2 C1, 2026-07-13)
#
# Curated, high-confidence Korean-skincare ingredient/concern associations —
# textbook-level pairings only (retinol/wrinkles, salicylic acid/acne, etc.),
# not derived from data mining. Same shape/consumption contract as
# concern_bee_attr_map.yaml (ingredient_surface_form → {concern_id, weight,
# label_ko}); weight is a discount factor, always lower than an explicit
# review-derived concern signal.
#
# Keys are raw Korean surface forms as they appear in review NER extraction
# (ING entity_group) / product MAIN_INGREDIENT — not INCI-normalized IDs,
# since no canonical ingredient_dict.yaml exists yet (Ingredient IRIs are
# built from normalize_text(word), see src/kg/adapter.py::to_graphrapping_iri).
# Common surface-form variants for the same ingredient are listed as separate
# keys (bee_attr_dict.yaml already does the same for BEE English aliases).
#
# SCOPE NOTE: this file is config-only. Wiring a consumer (a compute_bridged_
# concerns-style lookup over product ingredient facts, analogous to
# src/rec/concern_bridge.py's BEE_ATTR bridge) requires touching src/rec/**,
# which is outside this task's allowed-file scope (owned by a concurrent
# agent this session). See the P7-2 C1 completion report for the follow-up
# task this unblocks.

