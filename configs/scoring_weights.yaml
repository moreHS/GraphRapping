# Scoring weights for recommendation engine
# Sum should be ~1.0 (before shrinkage)

features:
  keyword_match: 0.22
  residual_bee_attr_match: 0.10
  context_match: 0.12
  concern_fit: 0.12
  ingredient_match: 0.08
  brand_match_conf_weighted: 0.07
  goal_fit_master: 0.05
  goal_fit_review_signal: 0.05
  category_affinity: 0.05
  freshness_boost: 0.04
  skin_type_fit: 0.06
  purchase_loyalty_score: 0.04
  novelty_bonus: 0.02

# Evidence shrinkage: shrinked = raw * (support / (support + k))
shrinkage_k: 10

# Brand confidence weight by source
brand_confidence:
  purchase: 1.0
  chat_strong: 0.7
  chat_weak: 0.4

# Recommendation modes
modes:
  strict:
    category_mismatch: zero_out
  explore:
    category_mismatch: penalty
    category_penalty: 0.3
  compare:
    category_mismatch: allow
    comparison_neighbor: true
