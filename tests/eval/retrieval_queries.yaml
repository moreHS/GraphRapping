# Retrieval-quality evaluation dataset (search-absorption track A5).
#
# Plan: fable_doc/plans/2026-07-23_search_absorption.md §A5.
#
# Every query is grounded in the SERVING catalog facts of
# mockdata/product_catalog_es.json (517 products, 39 brands, 111 categories,
# category groups skincare=271 / makeup=95 / bodycare=52 / haircare=50 /
# fragrance=10 / other=39). Only product ids / brands / ingredients that exist in
# that catalog are used; the legit_zero pair is intentionally out-of-domain.
#
# Judgment rules are INTENT-FAITHFUL (A5 review F1): a product earns
#   gain 2 (expected_top) only if it is the EXACT named product — an explicit
#          `product_ids` list, or ALL of `product_name_contains` (AND) present;
#   gain 1 (relevant) only if it satisfies EVERY checkable query constraint
#          (brand ∧ category_surface/category_group ∧ name_contains ∧
#           must_contain_ingredient ∧ profile_brand — all AND-combined);
#   gain 0 otherwise.
# Violations (must_not_brand / must_not_contain_ingredient /
# must_not_category_surface / must_not_category_group) flag a hard breach if
# present in the results. `expect_zero: true` marks the out-of-domain pair.
#
# Schema per item:
#   id · stratum · query · mode(anon|login) · holdout(bool) ·
#   gold_interpretation (surface-string slots the harness assembles through the
#     production _interpret_with_llm gate) · judgment (declarative rules above).
#
# holdout ≥30% (14/44), ≥1 per stratum — frozen dev discipline; excluded from the
# default baseline (surfaced only with --holdout).

# =========================================================================
# exact_product (5) — a named product should lead (gain-2 via explicit ids)
# =========================================================================
- id: q001
  stratum: exact_product
  query: "설화수 윤조에센스 어때"
  mode: anon
  holdout: false
  gold_interpretation:
    intent: recommend
    products: ["설화수 윤조에센스"]
    brands: ["설화수"]
  judgment:
    expected_top:
      product_ids: ["62214", "62242"]
    relevant:
      brand: "설화수"

