name: GraphRapping CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_postgres_integration:
        description: "Run Docker-backed Postgres integration checks"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  quality:
    name: Python Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff
        run: python -m ruff check src

      - name: Mypy
        run: python -m mypy src

      - name: Tests
        run: python -m pytest tests/ -q

  postgres-integration:
    name: Docker Postgres Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && inputs.run_postgres_integration

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Check Docker
        run: docker version

      - name: Run Postgres integration tests
        run: bash scripts/run_postgres_integration.sh
