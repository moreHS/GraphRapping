name: GraphRapping CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_postgres_integration:
        description: "Run Docker-backed Postgres integration checks"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  quality:
    name: Python Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff
        run: python -m ruff check src

      - name: Mypy
        run: python -m mypy src

      - name: Ontology config validation
        run: python -m src.cli validate-ontology

      - name: Tests
        run: python -m pytest tests/ -q

  postgres-service:
    # Wave 4 Task 2: PG-bound integration tests run on every push/PR via a
    # Postgres 16 service container. Auto-skipped tests now actually execute.
    name: Postgres Service Integration
    runs-on: ubuntu-latest
    # Wave 5.4: bumped from 15 → 25 to cover test_full_load_db (~5m) +
    # test_incremental_pipeline_db (~5m) + lock suite (~45s) + the original
    # five fast suites. Local LOCAL-mode wall-clock: 9m24s (51 tests).
    # CI shared runners are slower; 25m gives ~2.5× headroom.
    timeout-minutes: 25
    needs: quality

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: graphrapping_test
        ports:
          - 5432:5432
        # Health-check gates dependent steps until Postgres is ready.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      GRAPHRAPPING_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/graphrapping_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Postgres-bound integration tests
        # Wave 5.4: includes Wave 4 + 5 entrypoint & lock suites. test_full_load_db
        # and test_incremental_pipeline_db each run a full 906-review fixture
        # (~3-5 min apiece on local hardware); timeout bumped accordingly. If
        # CI wall-clock becomes a problem, split into a parallel job
        # (postgres-fullload-service) per the §5.4 plan fallback.
        # 5th-review fix: test_source_identity_collision.py and
        # test_retention_monitor.py each carry a pg_only-gated behavioural suite
        # (5 + 3 tests) that previously ran nowhere in CI — the quality job has
        # no Postgres, so their skipif gate always fired there.
        run: |
          python -m pytest \
            tests/test_postgres_integration.py \
            tests/test_wave1_integration_smoke.py \
            tests/test_dirty_product_propagation.py \
            tests/test_incremental_watermark_safety.py \
            tests/test_sql_prefilter_avoided.py \
            tests/test_candidate_prefilter_equivalence.py \
            tests/test_full_load_db.py \
            tests/test_incremental_pipeline_db.py \
            tests/test_pipeline_lock.py \
            tests/test_source_identity_collision.py \
            tests/test_retention_monitor.py \
            -q --timeout=600

  postgres-integration:
    name: Docker Postgres Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && inputs.run_postgres_integration

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Check Docker
        run: docker version

      - name: Run Postgres integration tests
        run: bash scripts/run_postgres_integration.sh
